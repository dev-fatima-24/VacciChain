services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - vaccichain
    deploy:
      resources:
        limits:
          # nginx serving pre-built static assets — no dynamic work.
          # 0.05 CPU covers TLS termination + gzip at ~50 req/s.
          # 32 MB covers nginx worker processes with room to spare.
          cpus: "0.05"
          memory: 32M
        reservations:
          cpus: "0.01"
          memory: 16M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - EVENT_POLL_INTERVAL_MS=${EVENT_POLL_INTERVAL_MS:-15000}
      - DATABASE_PATH=/data/vaccichain.db
    volumes:
      - vaccichain_db:/data
    depends_on:
      - python-service
    networks:
      - vaccichain
    deploy:
      resources:
        limits:
          # Node.js heap for Express + Stellar SDK sits ~80–100 MB at rest.
          # Soroban RPC calls are CPU-light but allocate XDR buffers transiently.
          # 0.75 CPU allows burst during contract invocations without starving neighbours.
          # 256 MB gives 2× headroom over observed peak; OOM before host pressure.
          cpus: "0.75"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  python-service:
    build: ./python-service
    ports:
      - "8001:8001"
    environment:
      - BACKEND_URL=http://backend:4000
      - ANOMALY_THRESHOLD=${ANOMALY_THRESHOLD:-50}
    networks:
      - vaccichain
    deploy:
      resources:
        limits:
          # FastAPI/uvicorn with httpx fan-out to Stellar Horizon.
          # Python baseline ~60 MB; analytics aggregation adds ~20 MB transiently.
          # 0.50 CPU handles concurrent async I/O without blocking the event loop.
          # 128 MB is 2× observed peak; keeps service isolated from backend OOM events.
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

networks:
  vaccichain:
    driver: bridge

volumes:
  vaccichain_db:
