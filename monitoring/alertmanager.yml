global:
  resolve_timeout: 5m
  # SMTP for email alerts — set via environment variables
  smtp_smarthost: "${SMTP_HOST:-smtp.example.com}:587"
  smtp_from: "alerts@vaccichain.example.com"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASSWORD}"

route:
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: critical
      continue: true
    - match:
        severity: warning
      receiver: warning

receivers:
  - name: default
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#vaccichain-alerts"
        title: "{{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"
        send_resolved: true

  - name: critical
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#vaccichain-alerts"
        title: "🚨 CRITICAL: {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"
        send_resolved: true
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        description: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"
    email_configs:
      - to: "${ALERT_EMAIL:-ops@vaccichain.example.com}"
        subject: "🚨 VacciChain CRITICAL: {{ .GroupLabels.alertname }}"
        body: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"

  - name: warning
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#vaccichain-alerts"
        title: "⚠️ WARNING: {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["instance"]
